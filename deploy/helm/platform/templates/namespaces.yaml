apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.database.namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    kubernetes.io/metadata.name: {{ .Values.database.namespace }}
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
    {{- include "holizuki-platform.labels" . | nindent 4 }}
---
{{- range $name, $environment := .Values.environments }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $environment.namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    kubernetes.io/metadata.name: {{ $environment.namespace }}
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
    holizuki.dev/environment: {{ $name }}
    {{- include "holizuki-platform.labels" $ | nindent 4 }}
---
{{- end }}
