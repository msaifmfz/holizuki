{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: holizuki-application
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    {{- include "holizuki-platform.labels" . | nindent 4 }}
spec:
  groups:
    - name: holizuki.application
      rules:
        - alert: HolizukiWebDeploymentUnavailable
          expr: kube_deployment_status_replicas_available{deployment="holizuki-web",namespace=~"production|staging"} < kube_deployment_spec_replicas{deployment="holizuki-web",namespace=~"production|staging"}
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Holizuki web deployment is unavailable
            description: "{{`{{ $labels.namespace }}`}} has fewer available web replicas than requested."
        - alert: HolizukiMigrationFailed
          expr: kube_job_status_failed{job_name=~"holizuki-migrate.*",namespace=~"production|staging"} > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: Holizuki database migration failed
            description: "The migration job in {{`{{ $labels.namespace }}`}} failed."
        {{- if .Values.backup.enabled }}
        - alert: HolizukiDatabaseBackupStale
          expr: (time() - barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{namespace=~"production|staging"}) > 129600 and barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{namespace=~"production|staging"} > 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: Holizuki database backup is stale
            description: "{{`{{ $labels.namespace }}`}} has no successful database backup in the last 36 hours."
        - alert: HolizukiDatabaseBackupFailed
          expr: barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp{namespace=~"production|staging"} > barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{namespace=~"production|staging"}
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: Latest Holizuki database backup failed
            description: "The most recent database backup attempt in {{`{{ $labels.namespace }}`}} failed."
        - alert: HolizukiWalArchiveBacklog
          expr: cnpg_collector_pg_wal_archive_status{namespace=~"production|staging",value="ready"} > 10
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Holizuki WAL archive is falling behind
            description: "{{`{{ $labels.namespace }}`}} has more than 10 WAL segments waiting to archive."
        {{- end }}
{{- end }}
