apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "holizuki.fullname" . }}-web
  labels:
    {{- include "holizuki.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  minReadySeconds: 5
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "holizuki.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "holizuki.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- include "holizuki.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "holizuki.serviceAccountName" . }}
      terminationGracePeriodSeconds: 120
      securityContext:
        {{- include "holizuki.podSecurityContext" . | nindent 8 }}
      containers:
        - name: web
          image: {{ include "holizuki.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - web
          securityContext:
            {{- include "holizuki.containerSecurityContext" . | nindent 12 }}
          {{- include "holizuki.env" . | nindent 10 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /up
              port: http
              httpHeaders:
                - name: Host
                  value: {{ .Values.host | quote }}
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: http
              httpHeaders:
                - name: Host
                  value: {{ .Values.host | quote }}
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /up
              port: http
              httpHeaders:
                - name: Host
                  value: {{ .Values.host | quote }}
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 5
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          {{- include "holizuki.volumeMounts" . | nindent 10 }}
      {{- include "holizuki.volumes" . | nindent 6 }}
