{{- if .Values.ingress.basicAuth.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "holizuki.fullname" . }}-basic-auth
  labels:
    {{- include "holizuki.labels" . | nindent 4 }}
spec:
  basicAuth:
    secret: {{ .Values.ingress.basicAuth.secretName }}
    removeHeader: true
---
{{- end }}
{{- if .Values.ingress.noIndex }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "holizuki.fullname" . }}-noindex
  labels:
    {{- include "holizuki.labels" . | nindent 4 }}
spec:
  headers:
    customResponseHeaders:
      X-Robots-Tag: noindex, nofollow, noarchive
{{- end }}
