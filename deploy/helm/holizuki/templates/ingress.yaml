{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "holizuki.fullname" . }}
  labels:
    {{- include "holizuki.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- if or .Values.ingress.basicAuth.enabled .Values.ingress.noIndex }}
    traefik.ingress.kubernetes.io/router.middlewares: {{- if .Values.ingress.basicAuth.enabled }} {{ printf "%s-%s-basic-auth@kubernetescrd" .Release.Namespace (include "holizuki.fullname" .) }}{{- end }}{{- if and .Values.ingress.basicAuth.enabled .Values.ingress.noIndex }},{{- end }}{{- if .Values.ingress.noIndex }}{{ printf "%s-%s-noindex@kubernetescrd" .Release.Namespace (include "holizuki.fullname" .) }}{{- end }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "holizuki.fullname" . }}
                port:
                  name: http
  tls:
    - hosts:
        - {{ .Values.host | quote }}
      secretName: {{ .Values.ingress.tlsSecretName }}
{{- end }}
