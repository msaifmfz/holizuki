alertmanager:
    alertmanagerSpec:
        resources:
            requests:
                cpu: 25m
                memory: 64Mi
            limits:
                cpu: 100m
                memory: 128Mi
        storage:
            volumeClaimTemplate:
                spec:
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 1Gi
                    storageClassName: local-path

grafana:
    admin:
        existingSecret: holizuki-grafana-admin
        passwordKey: admin-password
        userKey: admin-user
    ingress:
        enabled: false
    persistence:
        enabled: true
        size: 2Gi
        storageClassName: local-path
    resources:
        requests:
            cpu: 50m
            memory: 128Mi
        limits:
            cpu: 250m
            memory: 256Mi

    sidecar:
        resources:
            requests:
                cpu: 10m
                memory: 32Mi
            limits:
                cpu: 50m
                memory: 64Mi

prometheus:
    prometheusSpec:
        retention: 7d
        retentionSize: 6GB
        resources:
            requests:
                cpu: 150m
                memory: 384Mi
            limits:
                cpu: 750m
                memory: 1Gi
        serviceMonitorNamespaceSelector: {}
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        storageSpec:
            volumeClaimTemplate:
                spec:
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 8Gi
                    storageClassName: local-path

prometheusOperator:
    prometheusConfigReloader:
        resources:
            requests:
                cpu: 10m
                memory: 32Mi
            limits:
                cpu: 50m
                memory: 64Mi
    resources:
        requests:
            cpu: 50m
            memory: 64Mi
        limits:
            cpu: 250m
            memory: 256Mi

kube-state-metrics:
    resources:
        requests:
            cpu: 25m
            memory: 64Mi
        limits:
            cpu: 100m
            memory: 128Mi

prometheus-node-exporter:
    resources:
        requests:
            cpu: 20m
            memory: 32Mi
        limits:
            cpu: 100m
            memory: 64Mi
