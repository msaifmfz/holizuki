alertmanager:
    alertmanagerSpec:
        resources:
            requests:
                cpu: 50m
                memory: 128Mi
            limits:
                cpu: 250m
                memory: 256Mi
        storage:
            volumeClaimTemplate:
                spec:
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 2Gi
                    storageClassName: local-path

grafana:
    admin:
        existingSecret: holizuki-grafana-admin
        passwordKey: admin-password
        userKey: admin-user
    ingress:
        enabled: false
    persistence:
        enabled: true
        size: 5Gi
        storageClassName: local-path
    resources:
        requests:
            cpu: 100m
            memory: 256Mi
        limits:
            cpu: 500m
            memory: 512Mi

prometheus:
    prometheusSpec:
        retention: 15d
        resources:
            requests:
                cpu: 250m
                memory: 768Mi
            limits:
                cpu: '1'
                memory: 2Gi
        serviceMonitorNamespaceSelector: {}
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        storageSpec:
            volumeClaimTemplate:
                spec:
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 20Gi
                    storageClassName: local-path

prometheusOperator:
    resources:
        requests:
            cpu: 100m
            memory: 128Mi
        limits:
            cpu: 500m
            memory: 512Mi
