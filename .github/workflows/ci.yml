name: CI

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Immutable commit to test when CI is called by another workflow.
        required: false
        type: string
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TELESCOPE_ENABLED: 'false'

jobs:
  development-environment:
    name: Development environment
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Bootstrap toolchain
        uses: ./.github/actions/bootstrap

      - name: Bootstrap development environment
        run: devbox run setup

      - name: Verify development environment
        run: devbox run doctor

  php-quality:
    name: PHP quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Bootstrap toolchain
        uses: ./.github/actions/bootstrap
        with:
          install-composer: 'true'

      - name: Run PHP quality gates
        run: devbox run -- composer quality

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Bootstrap toolchain
        uses: ./.github/actions/bootstrap
        with:
          install-composer: 'true'

      - name: Prepare application
        run: |
          cp .env.example .env
          devbox run -- php artisan key:generate --no-interaction

      - name: Run backend tests with coverage
        run: devbox run -- composer test:coverage

  postgres-persistence-tests:
    name: PostgreSQL persistence tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18.3@sha256:7e32e9833a6fb1c92c32552794cb6ed569d51b445a54907d35fc112ef39684db
        env:
          POSTGRES_DB: holizuki
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d holizuki"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_DATABASE: holizuki
      DB_HOST: 127.0.0.1
      DB_PASSWORD: postgres
      DB_PORT: 5432
      DB_URL: ''
      DB_USERNAME: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Bootstrap toolchain
        uses: ./.github/actions/bootstrap
        with:
          install-composer: 'true'

      - name: Prepare application
        run: |
          cp .env.example .env
          devbox run -- php artisan key:generate --no-interaction

      - name: Run persistence tests against PostgreSQL
        run: >-
          devbox run -- php artisan test --compact
          tests/Feature/Publishing/PostReaderMetadataTest.php
          tests/Feature/Reading/ReaderDiscoveryTest.php
          tests/Feature/Reading/PostViewTrackingTest.php
          tests/Feature/Analytics/AnalyticsSynchronizationTest.php
          tests/Feature/Analytics/UrlAliasProjectionTest.php
          tests/Feature/Community/NewsletterSubscriptionTest.php
          tests/Feature/Community/CommentWorkflowTest.php

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Bootstrap toolchain
        uses: ./.github/actions/bootstrap
        with:
          install-composer: 'true'
          install-npm: 'true'

      - name: Build production assets
        run: devbox run -- npm run build:ssr

      - name: Run frontend quality gates
        run: devbox run -- npm run check

  browser-smoke:
    name: Browser smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Bootstrap toolchain
        uses: ./.github/actions/bootstrap
        with:
          install-composer: 'true'
          install-npm: 'true'
          install-playwright: 'true'

      - name: Prepare application
        run: |
          cp .env.example .env
          devbox run -- php artisan key:generate --no-interaction
          devbox run -- npm run build

      - name: Run browser smoke tests
        run: devbox run -- composer test:browser

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-smoke-failure
          path: |
            playwright-report
            test-results
            tests/Browser/Screenshots
          if-no-files-found: ignore
          retention-days: 7

  workflow-integrity:
    name: Workflow integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Check shell scripts
        run: |
          shellcheck .github/scripts/*.sh
          shellcheck devbox.d/*.sh
          shellcheck docker/entrypoint.sh
          bash -n .github/scripts/*.sh
          bash -n devbox.d/*.sh
          bash -n docker/entrypoint.sh

      - name: Check GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 .github/workflows/*.yml

      - name: Test release classification
        run: bash .github/scripts/test-classify-release.sh

      - name: Test deployment configuration
        run: bash .github/scripts/test-deployment-config.sh

      - name: Test atomic deployment
        run: bash .github/scripts/test-deploy-release.sh

      - name: Test deployment kubeconfig creation
        run: bash .github/scripts/test-create-deployer-kubeconfig.sh

      - name: Test immutable release publication
        run: bash .github/scripts/test-publish-release.sh

  deployment-manifests:
    name: Deployment manifests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      CRD_SCHEMA_CATALOG_COMMIT: 34cef0fc2698bbb611f475515e555a2d7ca85b6c

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Resolve deployment tool versions
        id: tools
        run: |
          # shellcheck disable=SC1091
          source deploy/platform/versions.env
          {
            echo "helm_version=$HELM_VERSION"
            echo "kubeconform_checksum=$KUBECONFORM_CHECKSUM"
            echo "kubeconform_version=$KUBECONFORM_VERSION"
            kubernetes_version="${K3S_VERSION#v}"
            kubernetes_version="${kubernetes_version%%+*}"
            echo "kubernetes_version=${kubernetes_version%.*}.0"
          } >>"$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: ${{ steps.tools.outputs.helm_version }}

      - name: Install kubeconform
        env:
          KUBECONFORM_CHECKSUM: ${{ steps.tools.outputs.kubeconform_checksum }}
          KUBECONFORM_VERSION: ${{ steps.tools.outputs.kubeconform_version }}
        run: |
          archive="$RUNNER_TEMP/kubeconform.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$archive" \
            "https://github.com/yannh/kubeconform/releases/download/$KUBECONFORM_VERSION/kubeconform-linux-amd64.tar.gz"
          echo "$KUBECONFORM_CHECKSUM  $archive" | sha256sum --check
          tar -xzf "$archive" -C "$RUNNER_TEMP" kubeconform
          install -m 0755 -D "$RUNNER_TEMP/kubeconform" "$HOME/.local/bin/kubeconform"
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Lint Helm charts
        run: |
          helm lint deploy/helm/holizuki --values deploy/helm/holizuki/values-production.yaml
          helm lint deploy/helm/holizuki --values deploy/helm/holizuki/values-staging.yaml
          helm lint deploy/helm/platform

      - name: Validate rendered Kubernetes resources
        env:
          KUBERNETES_VERSION: ${{ steps.tools.outputs.kubernetes_version }}
        run: |
          crd_schema="https://raw.githubusercontent.com/datreeio/CRDs-catalog/$CRD_SCHEMA_CATALOG_COMMIT/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"
          helm template holizuki deploy/helm/holizuki \
            --namespace production \
            --values deploy/helm/holizuki/values-production.yaml \
            | kubeconform -strict -summary -kubernetes-version "$KUBERNETES_VERSION" \
              -schema-location default -schema-location "$crd_schema"
          helm template holizuki deploy/helm/holizuki \
            --namespace staging \
            --values deploy/helm/holizuki/values-staging.yaml \
            | kubeconform -strict -summary -kubernetes-version "$KUBERNETES_VERSION" \
              -schema-location default -schema-location "$crd_schema"
          helm template holizuki-platform deploy/helm/platform \
            --set backup.enabled=true \
            --set monitoring.enabled=true \
            --set postgres.monitoringEnabled=true \
            | kubeconform -strict -summary -kubernetes-version "$KUBERNETES_VERSION" \
              -schema-location default -schema-location "$crd_schema"

  container-image:
    name: Container image
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Resolve pinned build images
        id: runtime
        run: |
          # shellcheck disable=SC1091
          source deploy/runtime-images.env
          {
            echo "composer_base_image=$COMPOSER_BASE_IMAGE"
            echo "node_base_image=$NODE_BASE_IMAGE"
            echo "php_base_image=$PHP_BASE_IMAGE_STAGING"
          } >>"$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build application image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          build-args: |
            APP_COMMIT=${{ inputs.checkout_ref || github.sha }}
            COMPOSER_BASE_IMAGE=${{ steps.runtime.outputs.composer_base_image }}
            NODE_BASE_IMAGE=${{ steps.runtime.outputs.node_base_image }}
            PHP_BASE_IMAGE=${{ steps.runtime.outputs.php_base_image }}
          cache-from: type=gha,scope=container-ci
          cache-to: type=gha,mode=max,scope=container-ci
          context: .
          load: true
          tags: holizuki:ci

      - name: Verify runtime contract
        run: bash .github/scripts/test-container.sh holizuki:ci
