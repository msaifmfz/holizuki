name: CI

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TELESCOPE_ENABLED: 'false'

jobs:
  php-quality:
    name: PHP quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Locate Composer cache
        id: composer-cache
        run: echo "directory=$(composer config cache-files-dir)" >>"$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.composer-cache.outputs.directory }}
          key: composer-${{ runner.os }}-php85-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php85-

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHP quality gates
        run: composer quality

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: xdebug

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Run backend tests with coverage
        run: composer test:coverage

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend quality gates
        run: npm run check

      - name: Build production assets
        run: npm run build

  browser-smoke:
    name: Browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          composer install --no-interaction --no-progress --prefer-dist
          npm ci

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction
          npm run build

      - name: Install Chromium
        run: npm run browser:install:ci

      - name: Run browser smoke tests
        run: composer test:browser

  workflow-integrity:
    name: Workflow integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check shell scripts
        run: |
          shellcheck .github/scripts/*.sh
          bash -n .github/scripts/*.sh

      - name: Test release classification
        run: bash .github/scripts/test-classify-release.sh

      - name: Test atomic deployment
        run: bash .github/scripts/test-deploy-release.sh
