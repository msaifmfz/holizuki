name: Deep quality

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: read

concurrency:
  group: deep-quality
  cancel-in-progress: false

env:
  TELESCOPE_ENABLED: 'false'

jobs:
  mutation-testing:
    name: Mutation testing
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Bootstrap toolchain
        uses: ./.github/actions/bootstrap
        with:
          install-composer: 'true'

      - name: Prepare application
        run: |
          cp .env.example .env
          devbox run -- php artisan key:generate --no-interaction

      - name: Run mutation testing
        run: devbox run -- composer test:mutation

  frontend-coverage:
    name: Frontend coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Bootstrap toolchain
        uses: ./.github/actions/bootstrap
        with:
          install-npm: 'true'

      - name: Run frontend tests with coverage
        run: devbox run -- npm run test:coverage
