name: Deploy release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing signed vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-rc.NUMBER tag to deploy.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  ci:
    name: Release CI
    needs: classify
    uses: ./.github/workflows/ci.yml
    with:
      checkout_ref: ${{ needs.classify.outputs.commit }}
    permissions:
      contents: read

  classify:
    name: Classify release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      commit: ${{ steps.release.outputs.commit }}
      environment: ${{ steps.release.outputs.environment }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Checkout release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.tag }}

      - name: Validate tag and workflow dispatch
        id: release
        env:
          EVENT_REF: ${{ github.ref }}
          EVENT_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          environment="$(.github/scripts/classify-release.sh "$RELEASE_TAG")"
          tag_commit="$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")"

          if [[ "$EVENT_REF" != "refs/tags/$RELEASE_TAG" ]]; then
            echo '::error::Dispatch this workflow from the same tag supplied in the tag input.'
            exit 1
          fi

          if [[ "$tag_commit" != "$EVENT_SHA" ]]; then
            echo '::error::The workflow dispatch SHA does not match the tag commit.'
            exit 1
          fi

          git fetch --no-tags origin main

          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo '::error::The release tag must point to a commit on main.'
            exit 1
          fi

          if release_json="$(gh api -H 'X-GitHub-Api-Version: 2026-03-10' "/repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" 2>/dev/null)"; then
            if ! jq --exit-status '.draft == true' <<<"$release_json" >/dev/null; then
              echo '::error::The release is already published and immutable.'
              exit 1
            fi
          fi

          {
            echo "commit=$tag_commit"
            echo "environment=$environment"
            echo "tag=$RELEASE_TAG"
          } >>"$GITHUB_OUTPUT"

  release-bundle:
    name: Build or promote immutable image
    needs:
      - ci
      - classify
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      attestations: write # Required to sign image and release-bundle provenance.
      contents: read
      id-token: write # Required to obtain the OIDC identity used for attestations.
      packages: write # Required to push release-candidate images and OCI attestations.

    steps:
      - name: Checkout release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.classify.outputs.commit }}

      - name: Resolve runtime and image names
        id: runtime
        env:
          RELEASE_ENVIRONMENT: ${{ needs.classify.outputs.environment }}
        run: |
          # shellcheck disable=SC1091
          source deploy/runtime-images.env
          # shellcheck disable=SC1091
          source deploy/platform/versions.env
          repository="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [[ "$RELEASE_ENVIRONMENT" == staging ]]; then
            php_base_image="$PHP_BASE_IMAGE_STAGING"
          else
            php_base_image="$PHP_BASE_IMAGE_PRODUCTION"
          fi

          {
            echo "composer_base_image=$COMPOSER_BASE_IMAGE"
            echo "helm_version=$HELM_VERSION"
            echo "node_base_image=$NODE_BASE_IMAGE"
            echo "php_base_image=$php_base_image"
            echo "repository=$repository"
          } >>"$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: needs.classify.outputs.environment == 'staging'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release candidate
        if: needs.classify.outputs.environment == 'staging'
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          build-args: |
            APP_COMMIT=${{ needs.classify.outputs.commit }}
            COMPOSER_BASE_IMAGE=${{ steps.runtime.outputs.composer_base_image }}
            NODE_BASE_IMAGE=${{ steps.runtime.outputs.node_base_image }}
            PHP_BASE_IMAGE=${{ steps.runtime.outputs.php_base_image }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release
          context: .
          platforms: ${{ vars.CONTAINER_PLATFORMS || 'linux/amd64' }}
          provenance: mode=max
          push: true
          sbom: true
          tags: |
            ${{ steps.runtime.outputs.repository }}:${{ needs.classify.outputs.tag }}
            ${{ steps.runtime.outputs.repository }}:sha-${{ needs.classify.outputs.commit }}

      - name: Scan candidate image
        if: needs.classify.outputs.environment == 'staging'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          exit-code: '1'
          format: table
          ignore-unfixed: true
          image-ref: ${{ steps.runtime.outputs.repository }}@${{ steps.build.outputs.digest }}
          severity: CRITICAL,HIGH

      - name: Attest candidate image
        if: needs.classify.outputs.environment == 'staging'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          push-to-registry: true
          subject-digest: ${{ steps.build.outputs.digest }}
          subject-name: ${{ steps.runtime.outputs.repository }}

      - name: Verify candidate image provenance
        if: needs.classify.outputs.environment == 'staging'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_REPOSITORY: ${{ steps.runtime.outputs.repository }}
        run: |
          gh attestation verify "oci://$IMAGE_REPOSITORY@$IMAGE_DIGEST" \
            --bundle-from-oci \
            --deny-self-hosted-runners \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/deploy.yml"

      - name: Create candidate manifest
        if: needs.classify.outputs.environment == 'staging'
        env:
          COMMIT: ${{ needs.classify.outputs.commit }}
          DIGEST: ${{ steps.build.outputs.digest }}
          PHP_BASE_IMAGE: ${{ steps.runtime.outputs.php_base_image }}
          RELEASE_TAG: ${{ needs.classify.outputs.tag }}
          REPOSITORY: ${{ steps.runtime.outputs.repository }}
        run: |
          .github/scripts/build-release.sh \
            "$RELEASE_TAG" \
            "$COMMIT" \
            "$REPOSITORY" \
            "$DIGEST" \
            "$PHP_BASE_IMAGE" \
            "$RUNNER_TEMP/release-manifest.json"

      - name: Resolve tested candidate
        if: needs.classify.outputs.environment == 'production'
        env:
          COMMIT: ${{ needs.classify.outputs.commit }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.classify.outputs.tag }}
          REPOSITORY: ${{ steps.runtime.outputs.repository }}
        run: |
          prefix="$RELEASE_TAG-rc."
          candidates="$RUNNER_TEMP/candidates.tsv"

          gh api --paginate \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "/repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq '.[] | select(.draft == false and .immutable == true and .prerelease == true) | .tag_name' \
            | awk -v prefix="$prefix" '
                index($0, prefix) == 1 && substr($0, length(prefix) + 1) ~ /^(0|[1-9][0-9]*)$/ {
                    print substr($0, length(prefix) + 1) "\t" $0
                }
            ' \
            | sort -nr >"$candidates"

          while IFS=$'\t' read -r _ candidate; do
            candidate_directory="$RUNNER_TEMP/candidate-$candidate"
            mkdir -p "$candidate_directory"

            if ! gh release download "$candidate" \
              --dir "$candidate_directory" \
              --pattern release-manifest.json; then
              continue
            fi

            if ! gh release download "$candidate" \
              --dir "$candidate_directory" \
              --pattern staging-verification.json; then
              continue
            fi

            candidate_manifest="$candidate_directory/release-manifest.json"
            staging_verification="$candidate_directory/staging-verification.json"

            if ! gh attestation verify "$candidate_manifest" \
              --deny-self-hosted-runners \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/deploy.yml" >/dev/null; then
              continue
            fi

            if ! gh attestation verify "$staging_verification" \
              --deny-self-hosted-runners \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/deploy.yml" >/dev/null; then
              continue
            fi

            if jq --exit-status \
              --arg candidate "$candidate" \
              --arg commit "$COMMIT" \
              --arg repository "$REPOSITORY" \
              '.schemaVersion == 1 and .release == $candidate and .environment == "staging" and .commit == $commit and .image.repository == $repository' \
              "$candidate_manifest" >/dev/null \
              && jq --exit-status \
                --arg candidate "$candidate" \
                --arg commit "$COMMIT" \
                --arg digest "$(jq --raw-output '.image.digest' "$candidate_manifest")" \
                '.schemaVersion == 1 and .status == "success" and .environment == "staging" and .release == $candidate and .commit == $commit and .image.digest == $digest' \
                "$staging_verification" >/dev/null; then
              digest="$(jq --raw-output '.image.digest' "$candidate_manifest")"
              php_base_image="$(jq --raw-output '.runtime.phpBaseImage' "$candidate_manifest")"
              .github/scripts/build-release.sh \
                "$RELEASE_TAG" \
                "$COMMIT" \
                "$REPOSITORY" \
                "$digest" \
                "$php_base_image" \
                "$RUNNER_TEMP/release-manifest.json" \
                "$candidate"
              break
            fi
          done <"$candidates"

          if [[ ! -f "$RUNNER_TEMP/release-manifest.json" ]]; then
            echo '::error::Production requires a tested release candidate from the exact same commit.'
            exit 1
          fi

      - name: Read promoted image reference
        if: needs.classify.outputs.environment == 'production'
        id: promoted
        run: |
          {
            echo "digest=$(jq --raw-output '.image.digest' "$RUNNER_TEMP/release-manifest.json")"
            echo "repository=$(jq --raw-output '.image.repository' "$RUNNER_TEMP/release-manifest.json")"
          } >>"$GITHUB_OUTPUT"

      - name: Verify promoted image provenance
        if: needs.classify.outputs.environment == 'production'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_DIGEST: ${{ steps.promoted.outputs.digest }}
          IMAGE_REPOSITORY: ${{ steps.promoted.outputs.repository }}
        run: |
          gh attestation verify "oci://$IMAGE_REPOSITORY@$IMAGE_DIGEST" \
            --bundle-from-oci \
            --deny-self-hosted-runners \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/deploy.yml"

      - name: Rescan promoted image
        if: needs.classify.outputs.environment == 'production'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          exit-code: '1'
          format: table
          ignore-unfixed: true
          image-ref: ${{ steps.promoted.outputs.repository }}@${{ steps.promoted.outputs.digest }}
          severity: CRITICAL,HIGH

      - name: Validate release manifest
        run: |
          jq --exit-status . "$RUNNER_TEMP/release-manifest.json" >/dev/null

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: ${{ steps.runtime.outputs.helm_version }}

      - name: Package application chart
        run: helm package deploy/helm/holizuki --destination "$RUNNER_TEMP/bundle"

      - name: Stage release bundle
        env:
          RELEASE_ENVIRONMENT: ${{ needs.classify.outputs.environment }}
        run: |
          cp "$RUNNER_TEMP/release-manifest.json" "$RUNNER_TEMP/bundle/release-manifest.json"
          cp "deploy/helm/holizuki/values-$RELEASE_ENVIRONMENT.yaml" "$RUNNER_TEMP/bundle/environment-values.yaml"

      - name: Attest release bundle
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            ${{ runner.temp }}/bundle/*.tgz
            ${{ runner.temp }}/bundle/environment-values.yaml
            ${{ runner.temp }}/bundle/release-manifest.json

      - name: Upload release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ needs.classify.outputs.tag }}
          path: ${{ runner.temp }}/bundle
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to ${{ needs.classify.outputs.environment }}
    needs:
      - classify
      - release-bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    concurrency:
      group: deploy-${{ needs.classify.outputs.environment }}
      cancel-in-progress: false
    environment:
      name: ${{ needs.classify.outputs.environment }}
      url: ${{ vars.DEPLOY_URL }}
    permissions:
      attestations: read # Required to verify the downloaded release-bundle provenance.
      contents: read

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ needs.classify.outputs.tag }}
          path: ${{ runner.temp }}/bundle

      - name: Verify release bundle provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          artifacts=(
            "$RUNNER_TEMP"/bundle/holizuki-*.tgz
            "$RUNNER_TEMP/bundle/environment-values.yaml"
            "$RUNNER_TEMP/bundle/release-manifest.json"
          )

          if (( ${#artifacts[@]} != 3 )); then
            echo '::error::The release bundle does not contain exactly one chart, values file, and manifest.'
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            gh attestation verify "$artifact" \
              --deny-self-hosted-runners \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/deploy.yml"
          done

      - name: Deploy with Helm over SSH
        env:
          APP_HOST: ${{ vars.APP_HOST }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
          DEPLOY_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          RELEASE_ENVIRONMENT: ${{ needs.classify.outputs.environment }}
          RELEASE_TAG: ${{ needs.classify.outputs.tag }}
        run: |
          for variable in APP_HOST DEPLOY_HOST DEPLOY_KNOWN_HOSTS DEPLOY_PRIVATE_KEY DEPLOY_URL DEPLOY_USER; do
            if [[ -z "${!variable}" ]]; then
              echo "::error::Missing deployment configuration: $variable"
              exit 1
            fi
          done

          [[ "$APP_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$DEPLOY_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$DEPLOY_USER" =~ ^[A-Za-z_][A-Za-z0-9_-]*$ ]]
          [[ "$DEPLOY_PORT" =~ ^[0-9]+$ ]]
          [[ "$DEPLOY_URL" == "https://$APP_HOST" || "$DEPLOY_URL" == "https://$APP_HOST/" ]]

          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" >"$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          install -m 600 /dev/null "$HOME/.ssh/deploy_key"
          printf '%s\n' "$DEPLOY_PRIVATE_KEY" >"$HOME/.ssh/deploy_key"

          chart="$(find "$RUNNER_TEMP/bundle" -maxdepth 1 -type f -name 'holizuki-*.tgz' -print -quit)"
          manifest="$RUNNER_TEMP/bundle/release-manifest.json"
          environment_values="$RUNNER_TEMP/bundle/environment-values.yaml"
          [[ -f "$chart" && -f "$manifest" && -f "$environment_values" ]]

          chart_checksum="$(sha256sum "$chart" | awk '{print $1}')"
          manifest_checksum="$(sha256sum "$manifest" | awk '{print $1}')"
          environment_values_checksum="$(sha256sum "$environment_values" | awk '{print $1}')"
          remote_prefix="/tmp/holizuki-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          remote_chart="$remote_prefix.tgz"
          remote_manifest="$remote_prefix.json"
          remote_environment_values="$remote_prefix-values.yaml"
          target="$DEPLOY_USER@$DEPLOY_HOST"

          ssh_options=(
            -i "$HOME/.ssh/deploy_key"
            -p "$DEPLOY_PORT"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
          )
          scp_options=(
            -i "$HOME/.ssh/deploy_key"
            -P "$DEPLOY_PORT"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
          )

          printf -v cleanup_command 'rm -f -- %q %q %q' "$remote_chart" "$remote_manifest" "$remote_environment_values"
          cleanup_remote() {
            # shellcheck disable=SC2029
            ssh "${ssh_options[@]}" "$target" "$cleanup_command" || true
          }
          trap cleanup_remote EXIT

          scp "${scp_options[@]}" "$chart" "$target:$remote_chart"
          scp "${scp_options[@]}" "$manifest" "$target:$remote_manifest"
          scp "${scp_options[@]}" "$environment_values" "$target:$remote_environment_values"

          printf -v deploy_command '/usr/local/bin/holizuki-deploy %q %q %q %q %q %q %q %q %q %q' \
            "$RELEASE_ENVIRONMENT" \
            "$RELEASE_TAG" \
            "$remote_chart" \
            "$chart_checksum" \
            "$remote_manifest" \
            "$manifest_checksum" \
            "$remote_environment_values" \
            "$environment_values_checksum" \
            "$APP_HOST" \
            "$DEPLOY_URL"

          # shellcheck disable=SC2029
          ssh "${ssh_options[@]}" "$target" "$deploy_command"

      - name: Record successful staging deployment
        if: needs.classify.outputs.environment == 'staging'
        env:
          COMMIT: ${{ needs.classify.outputs.commit }}
          RELEASE_TAG: ${{ needs.classify.outputs.tag }}
        run: |
          repository="$(jq --raw-output '.image.repository' "$RUNNER_TEMP/bundle/release-manifest.json")"
          digest="$(jq --raw-output '.image.digest' "$RUNNER_TEMP/bundle/release-manifest.json")"
          verification="$RUNNER_TEMP/release-verification/staging-verification.json"
          mkdir -p "$(dirname -- "$verification")"

          jq --null-input \
            --arg release "$RELEASE_TAG" \
            --arg commit "$COMMIT" \
            --arg repository "$repository" \
            --arg digest "$digest" \
            --arg deployedAt "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --arg workflowRun "https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{
              schemaVersion: 1,
              status: "success",
              environment: "staging",
              release: $release,
              commit: $commit,
              image: {repository: $repository, digest: $digest},
              deployedAt: $deployedAt,
              workflowRun: $workflowRun
            }' >"$verification"

      - name: Upload staging verification
        if: needs.classify.outputs.environment == 'staging'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-verification-${{ needs.classify.outputs.tag }}
          path: ${{ runner.temp }}/release-verification/staging-verification.json
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish immutable release
    needs:
      - classify
      - deploy
      - release-bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      attestations: write # Required to sign the staging deployment verification.
      contents: write # Required to create the draft, upload assets, and publish it.
      id-token: write # Required to obtain the OIDC identity used for attestation.

    steps:
      - name: Checkout release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.classify.outputs.commit }}

      - name: Download release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ needs.classify.outputs.tag }}
          path: ${{ runner.temp }}/bundle

      - name: Download staging verification
        if: needs.classify.outputs.environment == 'staging'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-verification-${{ needs.classify.outputs.tag }}
          path: ${{ runner.temp }}/release-verification

      - name: Attest staging verification
        if: needs.classify.outputs.environment == 'staging'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/release-verification/staging-verification.json

      - name: Assemble and publish release
        env:
          COMMIT: ${{ needs.classify.outputs.commit }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ENVIRONMENT: ${{ needs.classify.outputs.environment }}
          RELEASE_TAG: ${{ needs.classify.outputs.tag }}
        run: |
          if [[ "$RELEASE_ENVIRONMENT" == staging ]]; then
            verification="$RUNNER_TEMP/release-verification/staging-verification.json"
          else
            verification=''
          fi

          .github/scripts/publish-release.sh \
            "$RELEASE_ENVIRONMENT" \
            "$RELEASE_TAG" \
            "$COMMIT" \
            "$RUNNER_TEMP/bundle" \
            "$verification"
