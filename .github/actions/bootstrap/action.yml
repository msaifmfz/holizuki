name: Bootstrap toolchain
description: Install the pinned Devbox toolchain with Composer, npm, and Playwright caches.

inputs:
  install-composer:
    description: Install Composer dependencies.
    default: 'false'
  install-npm:
    description: Install npm dependencies.
    default: 'false'
  install-playwright:
    description: Install the Playwright Chromium browser.
    default: 'false'

runs:
  using: composite
  steps:
    - name: Install Devbox
      uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
      with:
        devbox-version: 0.17.5
        enable-cache: 'true'

    - name: Locate Composer cache
      id: composer-cache
      shell: bash
      run: echo "directory=$(devbox run --quiet -- composer config cache-files-dir)" >>"$GITHUB_OUTPUT"

    - name: Cache Composer packages
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.composer-cache.outputs.directory }}
        key: composer-${{ runner.os }}-${{ hashFiles('devbox.lock', 'composer.lock') }}
        restore-keys: composer-${{ runner.os }}-

    - name: Cache npm packages
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.npm
        key: npm-${{ runner.os }}-${{ hashFiles('devbox.lock', 'package-lock.json') }}
        restore-keys: npm-${{ runner.os }}-

    - name: Install Composer dependencies
      if: inputs.install-composer == 'true'
      shell: bash
      run: devbox run -- composer install --no-interaction --no-progress --prefer-dist

    - name: Install npm dependencies
      if: inputs.install-npm == 'true'
      shell: bash
      run: devbox run -- npm ci

    - name: Locate Playwright version
      if: inputs.install-playwright == 'true'
      id: playwright
      shell: bash
      run: echo "version=$(jq --raw-output '.packages["node_modules/playwright"].version' package-lock.json)" >>"$GITHUB_OUTPUT"

    - name: Cache Playwright browsers
      if: inputs.install-playwright == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}

    - name: Install Playwright Chromium
      if: inputs.install-playwright == 'true'
      shell: bash
      run: devbox run -- npm run browser:install:ci
